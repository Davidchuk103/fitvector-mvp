<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Виджет подбора размера одежды</title>
  <style>
    /* Базовые переменные темы и цветов интерфейса */
    :root {
      --bg-1: #0a0a14;
      --bg-2: #16162b;
      --card: rgba(255, 255, 255, 0.09);
      --card-border: rgba(255, 255, 255, 0.2);
      --text-main: #f4f4ff;
      --text-muted: #c4c4de;
      --accent: #8b5cf6;
      --accent-2: #a78bfa;
      --shadow: rgba(12, 10, 33, 0.45);
    }

    /* Сброс отступов и более предсказуемая модель размеров */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Фон страницы и центрирование виджета */
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Inter", "Segoe UI", Tahoma, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 10% 15%, #2a1e57 0%, transparent 32%),
        radial-gradient(circle at 85% 90%, #38216a 0%, transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      padding: 20px;
    }

    /* Контейнер виджета в стиле glassmorphism */
    .widget {
      width: min(100%, 560px);
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 22px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 20px 45px var(--shadow);
      padding: 26px 24px;
    }

    /* Заголовочная часть виджета */
    .title {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    /* Подпись под заголовком */
    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 22px;
    }

    /* Сетка блока с ползунками */
    .controls {
      display: grid;
      gap: 18px;
      margin-bottom: 24px;
    }

    /* Обертка каждого ползунка */
    .control {
      display: grid;
      gap: 9px;
    }

    /* Строка с названием параметра и текущим значением */
    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.98rem;
    }

    /* Бейдж со значением ползунка в реальном времени */
    .value-pill {
      min-width: 86px;
      text-align: center;
      font-weight: 600;
      color: #efe9ff;
      background: rgba(139, 92, 246, 0.28);
      border: 1px solid rgba(167, 139, 250, 0.5);
      border-radius: 999px;
      padding: 4px 10px;
    }

    /* Общий стиль ползунка */
    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(139, 92, 246, 0.75), rgba(167, 139, 250, 0.35));
      outline: none;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    /* Кастомный бегунок для WebKit-браузеров */
    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 19px;
      height: 19px;
      border-radius: 50%;
      background: #f4ecff;
      border: 2px solid var(--accent);
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    /* Увеличение бегунка при наведении */
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.08);
    }

    /* Кастомный бегунок для Firefox */
    input[type="range"]::-moz-range-thumb {
      width: 19px;
      height: 19px;
      border-radius: 50%;
      background: #f4ecff;
      border: 2px solid var(--accent);
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    /* Секция с кнопкой и результатом */
    .actions {
      display: grid;
      gap: 18px;
    }

    /* Фиолетовая кнопка запуска расчета размера */
    .btn {
      border: 0;
      border-radius: 14px;
      padding: 13px 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(139, 92, 246, 0.4);
      transition: transform 0.16s ease, box-shadow 0.2s ease, filter 0.2s ease;
      animation: pulse 2.3s ease-in-out infinite;
    }

    /* Эффекты интерактивности кнопки */
    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 14px 30px rgba(139, 92, 246, 0.5);
    }

    /* Эффект нажатия кнопки */
    .btn:active {
      transform: translateY(0);
    }

    /* Анимация мягкой пульсации кнопки */
    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 10px 24px rgba(139, 92, 246, 0.35);
      }
      50% {
        box-shadow: 0 16px 35px rgba(139, 92, 246, 0.55);
      }
    }

    /* Карточка с результатом вычисления размера */
    .result {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.17);
      border-radius: 16px;
      padding: 18px;
      display: grid;
      gap: 8px;
      justify-items: center;
      text-align: center;
    }

    /* Большой текст буквенного размера */
    .size {
      font-size: clamp(2.2rem, 7vw, 3.2rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.06em;
      color: #f3ebff;
      text-shadow: 0 0 18px rgba(167, 139, 250, 0.45);
    }

    /* Текст уровня уверенности алгоритма */
    .confidence {
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* Подсказка (fallback, метод API) */
    .status-hint {
      font-size: 0.88rem;
      color: #e9c46c;
      margin-top: 4px;
      min-height: 1.2em;
    }

    /* Блок лоадера во время запроса к API */
    .loader-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 72px;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .loader-wrap[hidden] {
      display: none !important;
    }

    .result-content[hidden] {
      display: none !important;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .btn:disabled {
      opacity: 0.75;
      cursor: not-allowed;
      transform: none;
      animation: none;
    }

    /* Адаптация интерфейса под узкие мобильные экраны */
    @media (max-width: 400px) {
      body {
        padding: 12px;
      }

      .widget {
        padding: 18px 16px;
        border-radius: 18px;
      }

      .title {
        font-size: 1.15rem;
      }

      .subtitle {
        font-size: 0.88rem;
        margin-bottom: 18px;
      }

      .value-pill {
        min-width: 74px;
        font-size: 0.86rem;
      }

      .btn {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <!-- Главный контейнер виджета подбора размера -->
  <main class="widget" aria-label="Подбор размера одежды">
    <!-- Верхняя информационная часть -->
    <h1 class="title">Подбор размера одежды</h1>
    <p class="subtitle">Укажите параметры тела и получите рекомендуемый размер.</p>

    <!-- Группа ползунков параметров -->
    <section class="controls">
      <!-- Ползунок роста -->
      <div class="control">
        <div class="label-row">
          <label for="height">Рост</label>
          <span id="heightValue" class="value-pill">175 см</span>
        </div>
        <input id="height" type="range" min="140" max="220" value="175" />
      </div>

      <!-- Ползунок веса -->
      <div class="control">
        <div class="label-row">
          <label for="weight">Вес</label>
          <span id="weightValue" class="value-pill">70 кг</span>
        </div>
        <input id="weight" type="range" min="40" max="150" value="70" />
      </div>

      <!-- Ползунок талии -->
      <div class="control">
        <div class="label-row">
          <label for="waist">Талия</label>
          <span id="waistValue" class="value-pill">82 см</span>
        </div>
        <input id="waist" type="range" min="60" max="140" value="82" />
      </div>
    </section>

    <!-- Блок кнопки запуска и отображения результата -->
    <section class="actions">
      <button id="calcBtn" class="btn" type="button">Подобрать размер</button>
      <div class="result" aria-live="polite">
        <div id="loader" class="loader-wrap" hidden>
          <span class="spinner" aria-hidden="true"></span>
          <span>Загрузка...</span>
        </div>
        <div id="resultContent" class="result-content">
          <div id="sizeResult" class="size">M</div>
          <div id="confidenceResult" class="confidence">Уверенность: 90%</div>
          <div id="statusHint" class="status-hint"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    // URL бэкенда на Railway (POST /calculate)
    const API_URL = "https://fitvector-mvp-production.up.railway.app/calculate";
    const REQUEST_TIMEOUT_MS = 8000;

    // Получаем ссылки на элементы управления и вывода результата
    const heightInput = document.getElementById("height");
    const weightInput = document.getElementById("weight");
    const waistInput = document.getElementById("waist");
    const heightValue = document.getElementById("heightValue");
    const weightValue = document.getElementById("weightValue");
    const waistValue = document.getElementById("waistValue");
    const calcBtn = document.getElementById("calcBtn");
    const loaderEl = document.getElementById("loader");
    const resultContent = document.getElementById("resultContent");
    const sizeResult = document.getElementById("sizeResult");
    const confidenceResult = document.getElementById("confidenceResult");
    const statusHint = document.getElementById("statusHint");

    // Описываем диапазоны талии для каждого размера
    const sizeRanges = [
      { size: "S", min: 60, max: 76, includeMax: false },
      { size: "M", min: 76, max: 84, includeMax: false },
      { size: "L", min: 84, max: 94, includeMax: false },
      { size: "XL", min: 94, max: 104, includeMax: true },
      { size: "XXL", min: 104, max: 140, includeMax: true }
    ];

    // Обновляем подписи рядом с ползунками в реальном времени
    function syncSliderLabels() {
      heightValue.textContent = `${heightInput.value} см`;
      weightValue.textContent = `${weightInput.value} кг`;
      waistValue.textContent = `${waistInput.value} см`;
    }

    // Определяем буквенный размер только по текущему значению талии
    function getSizeByWaist(waist) {
      for (const range of sizeRanges) {
        const inRange = range.includeMax
          ? waist >= range.min && waist <= range.max
          : waist >= range.min && waist < range.max;
        if (inRange) return range;
      }
      return sizeRanges[sizeRanges.length - 1];
    }

    // Считаем уверенность: 0.9 в центре диапазона и 0.6 на границах
    function calculateConfidence(waist, range) {
      const center = (range.min + range.max) / 2;
      const halfRange = (range.max - range.min) / 2;
      if (halfRange === 0) return 0.9;

      const distanceToCenter = Math.abs(waist - center);
      const normalized = Math.min(distanceToCenter / halfRange, 1);
      const confidence = 0.9 - normalized * 0.3;

      return Math.max(0.6, Math.min(0.9, confidence));
    }

    // Локальный расчёт (fallback, если API недоступен)
    function renderLocalSize() {
      const waist = Number(waistInput.value);
      const foundRange = getSizeByWaist(waist);
      const confidence = calculateConfidence(waist, foundRange);
      const confidencePercent = Math.round(confidence * 100);

      sizeResult.textContent = foundRange.size;
      confidenceResult.textContent = `Уверенность: ${confidencePercent}% (локально)`;
    }

    function setLoading(isLoading) {
      loaderEl.hidden = !isLoading;
      resultContent.hidden = isLoading;
      calcBtn.disabled = isLoading;
    }

    async function fetchSizeFromApi() {
      const body = {
        height: Number(heightInput.value),
        weight: Number(weightInput.value),
        waist: Number(waistInput.value),
      };

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
          signal: controller.signal,
        });
        clearTimeout(timeoutId);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        if (
          !data ||
          typeof data.size !== "string" ||
          typeof data.confidence !== "number"
        ) {
          throw new Error("Invalid response");
        }
        return data;
      } catch (err) {
        clearTimeout(timeoutId);
        throw err;
      }
    }

    function notifyParentSize() {
      const size = sizeResult.textContent?.trim();
      if (!size) return;
      try {
        if (window.parent !== window) {
          window.parent.postMessage({ type: "fitvector:size", size }, "*");
        }
      } catch (_) {
        /* ignore */
      }
    }

    async function onCalculateClick() {
      statusHint.textContent = "";
      setLoading(true);

      try {
        const data = await fetchSizeFromApi();
        const pct = Math.round(Number(data.confidence) * 100);
        const method = data.method != null ? String(data.method) : "—";

        sizeResult.textContent = data.size;
        confidenceResult.textContent = `Уверенность: ${pct}% · метод: ${method}`;
        notifyParentSize();
      } catch (err) {
        statusHint.textContent = "Пробуем локально...";
        renderLocalSize();
        notifyParentSize();
        window.setTimeout(() => {
          statusHint.textContent = "";
        }, 3500);
      } finally {
        setLoading(false);
      }
    }

    // Подписываемся на ввод, чтобы обновлять числа у ползунков мгновенно
    [heightInput, weightInput, waistInput].forEach((input) => {
      input.addEventListener("input", syncSliderLabels);
    });

    // Кнопка: запрос к API, при ошибке — локальный алгоритм
    calcBtn.addEventListener("click", onCalculateClick);

    // Первичная инициализация: подписи ползунков и стартовый локальный превью
    syncSliderLabels();
    renderLocalSize();
  </script>
</body>
</html>
